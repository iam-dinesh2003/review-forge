# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/reviewforge}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.open-in-view=false

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ── GitHub App ────────────────────────────────────────────────────────────────
github.app.id=${GITHUB_APP_ID:0}
# PAT for candidate analysis (public repos) — increases rate limit from 60 to 5000 req/hr
github.pat=${GITHUB_PAT:}
# Private key: paste full PEM value (newlines as \n) or set via env var
github.app.private-key=${GITHUB_APP_PRIVATE_KEY:}
github.app.webhook-secret=${GITHUB_APP_WEBHOOK_SECRET:dev-secret}

# ── Gemini AI ─────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash-preview-05-20
gemini.max-diff-chars=12000

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Async thread pool ─────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=rf-review-

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.reviewforge=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
