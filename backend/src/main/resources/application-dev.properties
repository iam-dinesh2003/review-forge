# ── H2 in-memory DB (no PostgreSQL needed) ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:reviewforge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Disable Redis (use in-memory token cache) ─────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# ── Disable Redis session/cache repos ─────────────────────────────────────────
spring.data.redis.repositories.enabled=false

# ── Relax GitHub App requirements for local UI testing ────────────────────────
github.app.id=0
github.app.webhook-secret=dev-secret
